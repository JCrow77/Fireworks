<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Romantic Universe · Eternal Love ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
            overflow: hidden;
            color: #fff;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 15px;
        }
        .canvas-wrapper {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 
                        0 0 0 2px rgba(255, 215, 0, 0.3) inset,
                        0 0 20px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            display: block;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.2);
            width: 100%;
            aspect-ratio: 9/16;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            touch-action: manipulation;
        }
        
        /* 加载提示 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #FFD700;
            z-index: 100;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            .canvas-wrapper {
                border-radius: 15px;
            }
        }
        
        @media (max-width: 360px) {
            body {
                padding: 5px;
            }
            .container {
                padding: 5px;
            }
        }
        
        /* 防止长按菜单 */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* 触摸反馈优化 */
        button, canvas {
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-wrapper">
        <div class="loading">加载中...</div>
        <canvas id="romanticCanvas"></canvas>
    </div>
</div>
<script>
    (function(){
        "use strict";

        // 获取画布和上下文
        const canvas = document.getElementById('romanticCanvas');
        const ctx = canvas.getContext('2d');
        
        // 移除加载提示
        const loadingEl = document.querySelector('.loading');
        if (loadingEl) {
            loadingEl.style.display = 'none';
        }
        
        // 根据容器大小设置画布尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            // 设置画布尺寸（考虑设备像素比）
            const pixelRatio = window.devicePixelRatio || 1;
            canvas.width = containerWidth * pixelRatio;
            canvas.height = containerHeight * pixelRatio;
            
            // 缩放上下文以匹配CSS尺寸
            ctx.scale(pixelRatio, pixelRatio);
            
            // 返回CSS尺寸
            return {
                width: containerWidth,
                height: containerHeight
            };
        }
        
        // 初始尺寸
        let size = resizeCanvas();
        let W = size.width;
        let H = size.height;
        
        // 监听窗口大小变化
        window.addEventListener('resize', function() {
            size = resizeCanvas();
            W = size.width;
            H = size.height;
        });

        // ---------- 全局参数 ----------
        const STATE_CURTAIN = 0;
        const STATE_FIREWORKS = 1;
        const STATE_TEXT = 2;
        let state = STATE_CURTAIN;

        // 帷幕
        let leftCurtainX = 0;
        let rightCurtainX = W / 2;
        const curtainSpeed = W * 0.005; // 基于宽度比例
        let curtainOpen = false;

        // 烟花计时
        let fireworkTimer = 0;
        const FIREWORK_INTERVAL = 25;
        const MAX_FIREWORKS = 10; // 手机端减少烟花数量
        let fireworks = [];
        let stateStartTime = 0;

        // 宇宙粒子
        let cosmicParticles = [];
        const COSMIC_PARTICLES_COUNT = Math.min(150, Math.floor(W * H / 100)); // 基于面积调整数量
        let nebulae = [];
        const NEBULAE_COUNT = 2; // 手机端减少星云数量

        // 文字动画
        let textAlpha = 0;
        let textScale = 1.0;
        let floatOffset = 0.0;
        let heartbeat = 0;

        // 按钮
        let buttons = [];
        let showHeartFeedback = false;
        let heartTimer = 0;
        let heartPos = { x: 0, y: 0 };

        // 礼物（戒指和玫瑰）
        let showGift = false;
        let giftAlpha = 0;
        let giftRevealed = false;
        let roseFloatOffset = 0;
        let ringFloatOffset = 0;

        // 触摸/鼠标位置
        let touchX = 0, touchY = 0;
        let isTouching = false;

        // ---------- 辅助函数：颜色 ----------
        const COLORS = {
            BLACK: '#000000',
            WHITE: '#FFFFFF',
            RED: '#DC143C',
            GOLD: '#FFD700',
            PINK: '#FF69B4',
            DARK_RED: '#8B0000',
            CURTAIN_RED: '#8C1414',
            CURTAIN_DARK: '#500000',
            GOLDEN: '#FFDF00',
            BLUE: '#1E90FF',
            PURPLE: '#BA55D3',
            ROSE: '#C81E32',
            LEAF: '#228B22',
            STARLIGHT: '#E6E6FA',
            NEBULA_PINK: '#FF1493',
            NEBULA_BLUE: '#4169E1',
            NEBULA_PURPLE: '#9370DB'
        };

        // ---------- 宇宙粒子系统 ----------
        class CosmicParticle {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 0.5 + Math.random() * 1.5; // 手机端减小粒子大小
                this.speed = 0.05 + Math.random() * 0.3; // 手机端减慢速度
                this.brightness = 50 + Math.floor(Math.random() * 206);
                this.twinkleSpeed = 0.01 + Math.random() * 0.02;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.type = Math.random() > 0.9 ? 'sparkle' : 'star';
                this.color = this.getColor();
            }
            
            getColor() {
                const colors = [
                    {r: 255, g: 255, b: 255},
                    {r: 255, g: 250, b: 205},
                    {r: 230, g: 230, b: 250},
                    {r: 176, g: 224, b: 230},
                    {r: 255, g: 228, b: 225}
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.brightness = 80 + Math.sin(this.twinklePhase) * 100;
                this.brightness = Math.max(30, Math.min(255, this.brightness));
                
                // 缓慢移动
                this.x += Math.sin(this.twinklePhase * 0.5) * 0.05;
                this.y += Math.cos(this.twinklePhase * 0.3) * 0.05;
                
                // 边界检查
                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < 0) this.y = H;
                if (this.y > H) this.y = 0;
            }
            
            draw(ctx) {
                const alpha = this.brightness / 255;
                
                if (this.type === 'sparkle') {
                    // 闪烁的星星
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                    
                    // 手机端简化星光效果
                    if (this.size > 1) {
                        ctx.beginPath();
                        ctx.moveTo(this.x - this.size * 2, this.y);
                        ctx.lineTo(this.x + this.size * 2, this.y);
                        ctx.moveTo(this.x, this.y - this.size * 2);
                        ctx.lineTo(this.x, this.y + this.size * 2);
                        ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`;
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                    }
                } else {
                    // 普通星星
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                }
            }
        }

        // ---------- 星云 ----------
        class Nebula {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 50 + Math.random() * 100; // 手机端减小星云大小
                this.color = this.getColor();
                this.density = 0.3 + Math.random() * 0.4;
                this.pulseSpeed = 0.002 + Math.random() * 0.002;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            
            getColor() {
                const colors = [
                    {r: 255, g: 20, b: 147, a: 0.02},  // 深粉色
                    {r: 65, g: 105, b: 225, a: 0.03},   // 皇家蓝
                    {r: 147, g: 112, b: 219, a: 0.025}, // 中紫色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.pulsePhase += this.pulseSpeed;
            }
            
            draw(ctx) {
                const pulse = 0.8 + Math.sin(this.pulsePhase) * 0.2;
                const currentSize = this.size * pulse;
                
                // 创建径向渐变
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentSize
                );
                
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a})`);
                gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a * 0.3})`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // ---------- 烟花粒子系统 ----------
        class SparkleParticle {
            constructor(x, y, color, vx, vy, lifetime, gravity = 0.05, size = 2, trail = false) { // 手机端减小参数
                this.x = x; this.y = y;
                this.color = color;
                this.vx = vx; this.vy = vy;
                this.lifetime = lifetime;
                this.maxLifetime = lifetime;
                this.age = 0;
                this.gravity = gravity;
                this.size = size;
                this.trail = trail;
                this.prevPositions = [];
            }
            update() {
                if (this.trail && this.age % 3 === 0) { // 手机端减少轨迹更新频率
                    this.prevPositions.push({ x: this.x, y: this.y });
                    if (this.prevPositions.length > 6) this.prevPositions.shift(); // 减少轨迹长度
                }
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.age++;
                return this.age < this.lifetime;
            }
            draw(ctx) {
                const alpha = Math.max(0, 255 - Math.floor(255 * this.age / this.lifetime));
                const currentSize = Math.max(0.5, this.size * (1 - this.age / this.lifetime) + 1);
                
                if (this.trail && this.prevPositions.length > 1) {
                    for (let i = 0; i < this.prevPositions.length; i++) {
                        const pos = this.prevPositions[i];
                        const trailAlpha = Math.floor(alpha * (i / this.prevPositions.length) * 0.4);
                        const trailSize = Math.max(0.3, currentSize * (i / this.prevPositions.length));
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, trailSize, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${trailAlpha / 255})`;
                        ctx.fill();
                    }
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha / 4 / 255})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha / 255})`;
                ctx.fill();
            }
        }

        class GlitterFirework {
            constructor() {
                this.x = W * 0.2 + Math.random() * (W * 0.6);
                this.y = H * 0.2 + Math.random() * (H * 0.4);
                this.particles = [];
                this.secondaryParticles = [];
                this.exploded = false;
                this.secondaryExploded = false;
                this.rocketY = H;
                this.rocketSpeed = 5 + Math.floor(Math.random() * 4); // 手机端减慢速度
                this.rocketX = this.x;
                this.rocketTrail = [];
                
                const palettes = [
                    [{ r: 220, g: 20, b: 60 }, { r: 255, g: 215, b: 0 }, { r: 255, g: 105, b: 180 }],
                    [{ r: 30, g: 144, b: 255 }, { r: 0, g: 255, b: 255 }, { r: 186, g: 85, b: 211 }],
                ];
                this.colorPalette = palettes[Math.floor(Math.random() * palettes.length)];
                this.explosionType = ['sphere', 'heart'][Math.floor(Math.random() * 2)]; // 简化爆炸类型
            }
            update() {
                if (!this.exploded) {
                    this.rocketTrail.push({ x: this.rocketX, y: this.rocketY });
                    if (this.rocketTrail.length > 8) this.rocketTrail.shift(); // 减少轨迹长度
                    this.rocketY -= this.rocketSpeed;
                    if (this.rocketY <= this.y) {
                        this.exploded = true;
                        this.explode();
                    }
                    return true;
                } else {
                    this.particles = this.particles.filter(p => p.update());
                    if (this.secondaryExploded) {
                        this.secondaryParticles = this.secondaryParticles.filter(p => p.update());
                    } else if (this.particles.length < 30 && !this.secondaryExploded) { // 减少粒子数量
                        this.secondaryExplode();
                    }
                    return this.particles.length > 0 || this.secondaryParticles.length > 0;
                }
            }
            explode() {
                const num = 40 + Math.floor(Math.random() * 21); // 减少粒子数量
                for (let i = 0; i < num; i++) {
                    let angle, speed;
                    if (this.explosionType === 'sphere') {
                        angle = Math.random() * 2 * Math.PI;
                        speed = 2 + Math.random() * 2; // 减慢速度
                    } else {
                        const t = Math.random() * 2 * Math.PI;
                        const x = 12 * Math.pow(Math.sin(t), 3); // 减小心形大小
                        const y = 10 * Math.cos(t) - 4 * Math.cos(2*t) - 1.5*Math.cos(3*t) - Math.cos(4*t);
                        angle = Math.atan2(y, x);
                        speed = 2 + Math.random() * 2;
                    }
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const lifetime = 40 + Math.floor(Math.random() * 31); // 缩短寿命
                    const color = this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)];
                    const size = 2 + Math.floor(Math.random() * 2); // 减小大小
                    this.particles.push(new SparkleParticle(this.x, this.y, color, vx, vy, lifetime, 0.04, size, true));
                }
            }
            secondaryExplode() {
                this.secondaryExploded = true;
                for (let i = 0; i < 15; i++) { // 减少二次爆炸粒子
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 1 + Math.random() * 2;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const lifetime = 30 + Math.floor(Math.random() * 21);
                    const color = { r: 255, g: 223, b: 0 };
                    this.secondaryParticles.push(new SparkleParticle(this.x, this.y, color, vx, vy, lifetime, 0.03, 1.5, false));
                }
            }
            draw(ctx) {
                if (!this.exploded) {
                    for (let i = 0; i < this.rocketTrail.length; i++) {
                        const pos = this.rocketTrail[i];
                        const alpha = Math.floor(200 * (i / this.rocketTrail.length));
                        const size = Math.floor(2 * (i / this.rocketTrail.length)) + 0.5;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 200, 100, ${alpha/255})`;
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(this.rocketX, this.rocketY, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#FFF';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.rocketX, this.rocketY, 2, 0, Math.PI*2);
                    ctx.fillStyle = '#FFDF00';
                    ctx.fill();
                } else {
                    this.particles.forEach(p => p.draw(ctx));
                    this.secondaryParticles.forEach(p => p.draw(ctx));
                }
            }
        }

        // ---------- 初始化宇宙粒子 ----------
        function initParticles() {
            cosmicParticles = [];
            nebulae = [];
            
            for (let i = 0; i < COSMIC_PARTICLES_COUNT; i++) {
                cosmicParticles.push(new CosmicParticle());
            }
            
            for (let i = 0; i < NEBULAE_COUNT; i++) {
                nebulae.push(new Nebula());
            }
        }

        // ---------- 按钮类 ----------
        class CanvasButton {
            constructor(x, y, w, h, text, normalColor, hoverColor, clickColor) {
                this.rect = { x, y, w, h };
                this.text = text;
                this.normal = normalColor;
                this.hover = hoverColor;
                this.click = clickColor;
                this.current = normalColor;
                this.clicked = false;
                this.clickTimer = 0;
                this.glow = 0;
                this.glowDirection = 1;
            }
            checkHover(mx, my) {
                return mx >= this.rect.x && mx <= this.rect.x + this.rect.w && my >= this.rect.y && my <= this.rect.y + this.rect.h;
            }
            handleMove(mx, my) {
                if (giftRevealed) return;
                this.current = this.checkHover(mx, my) ? this.hover : this.normal;
            }
            handleClick(mx, my) {
                if (giftRevealed) return false;
                if (this.checkHover(mx, my)) {
                    this.clicked = true;
                    this.clickTimer = 8; // 缩短点击反馈时间
                    this.current = this.click;
                    return true;
                }
                return false;
            }
            update() {
                if (this.clicked) {
                    this.clickTimer--;
                    if (this.clickTimer <= 0) {
                        this.clicked = false;
                        this.current = this.normal;
                    }
                }
                
                // 按钮发光效果
                if (!giftRevealed) {
                    this.glow += 0.03 * this.glowDirection; // 减慢发光速度
                    if (this.glow > 1) {
                        this.glow = 1;
                        this.glowDirection = -1;
                    } else if (this.glow < 0.3) {
                        this.glow = 0.3;
                        this.glowDirection = 1;
                    }
                }
            }
            draw(ctx) {
                if (giftRevealed) return;
                
                // 按钮背景
                ctx.fillStyle = this.current;
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 4 + this.glow * 4; // 减小阴影
                ctx.beginPath();
                ctx.roundRect(this.rect.x, this.rect.y, this.rect.w, this.rect.h, 10); // 减小圆角
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 按钮边框
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // 按钮文字 - 手机端减小字体
                ctx.font = `bold ${Math.max(24, Math.min(32, W/15))}px Georgia, "Times New Roman", serif`;
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#500000';
                ctx.shadowBlur = 2;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.rect.x + this.rect.w/2 + 1, this.rect.y + this.rect.h/2 + 1);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(this.text, this.rect.x + this.rect.w/2, this.rect.y + this.rect.h/2);
            }
        }

        // 添加 roundRect 方法（如果不存在）
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // 初始化按钮
        function initButtons() {
            buttons = [];
            const btnW = Math.max(100, W * 0.35); // 按钮宽度基于屏幕宽度
            const btnH = Math.max(40, H * 0.08);  // 按钮高度基于屏幕高度
            const spacing = W * 0.05; // 间距基于屏幕宽度
            
            const startX = (W - (btnW*2 + spacing)) / 2;
            const btnY = H - btnH - H * 0.1; // 按钮位置
            const btn1 = new CanvasButton(startX, btnY, btnW, btnH, 'Yes, I Do!', '#C85064', '#E68C96', '#A03246');
            const btn2 = new CanvasButton(startX + btnW + spacing, btnY, btnW, btnH, 'Forever!', '#C85064', '#E68C96', '#A03246');
            buttons = [btn1, btn2];
        }

        // ---------- 简化的文字绘制（无发光效果） ----------
        function drawSimpleText(ctx, text, x, y, fontSize, color, alpha = 1.0, scale = 1.0, offsetY = 0) {
            if (giftRevealed) return;
            ctx.save();
            ctx.translate(x, y + offsetY);
            ctx.scale(scale, scale);
            
            // 字体大小基于屏幕尺寸
            const scaledFontSize = Math.max(20, Math.min(fontSize, W/10));
            ctx.font = `bold ${scaledFontSize}px Georgia, "Times New Roman", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 简化的金色文字，无发光效果
            ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        // ---------- 写实玫瑰（手机端简化版） ----------
        function drawSimpleRose(ctx, x, y, size = 1.0, alpha = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            
            // 花茎
            ctx.beginPath();
            ctx.moveTo(0, 30 * size);
            ctx.lineTo(0, 80 * size);
            ctx.lineWidth = 6 * size;
            ctx.strokeStyle = `rgba(34, 139, 34, ${alpha})`;
            ctx.stroke();
            
            // 简化花瓣
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const petalSize = 15 * size;
                
                ctx.save();
                ctx.rotate(angle);
                
                // 花瓣渐变
                const gradient = ctx.createRadialGradient(
                    0, -10 * size, 0,
                    0, -10 * size, petalSize
                );
                gradient.addColorStop(0, `rgba(220, 20, 60, ${alpha})`);
                gradient.addColorStop(0.8, `rgba(255, 105, 180, ${alpha * 0.7})`);
                gradient.addColorStop(1, `rgba(255, 182, 193, 0)`);
                
                ctx.beginPath();
                ctx.ellipse(0, -10 * size, petalSize, petalSize * 0.6, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
            
            // 花蕊
            ctx.beginPath();
            ctx.arc(0, 0, 4 * size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
            ctx.fill();
            
            ctx.restore();
        }

        // ---------- 写实戒指（手机端简化版） ----------
        function drawSimpleRing(ctx, x, y, size = 1.0, alpha = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            
            // 戒指环
            const ringGradient = ctx.createLinearGradient(-15 * size, 0, 15 * size, 0);
            ringGradient.addColorStop(0, `rgba(218, 165, 32, ${alpha})`);
            ringGradient.addColorStop(0.5, `rgba(255, 215, 0, ${alpha})`);
            ringGradient.addColorStop(1, `rgba(218, 165, 32, ${alpha})`);
            
            ctx.beginPath();
            ctx.ellipse(0, 0, 15 * size, 7 * size, 0, 0, Math.PI * 2);
            ctx.fillStyle = ringGradient;
            ctx.fill();
            
            // 钻石
            ctx.beginPath();
            ctx.moveTo(0, -25 * size);
            ctx.lineTo(5 * size, -15 * size);
            ctx.lineTo(0, -10 * size);
            ctx.lineTo(-5 * size, -15 * size);
            ctx.closePath();
            
            const diamondGradient = ctx.createLinearGradient(-5 * size, -15 * size, 5 * size, -15 * size);
            diamondGradient.addColorStop(0, `rgba(230, 230, 250, ${alpha})`);
            diamondGradient.addColorStop(0.5, `rgba(255, 255, 255, ${alpha})`);
            diamondGradient.addColorStop(1, `rgba(230, 230, 250, ${alpha})`);
            
            ctx.fillStyle = diamondGradient;
            ctx.fill();
            
            ctx.restore();
        }

        // ---------- 帷幕 ----------
        function drawCurtains() {
            // 星空背景
            drawCosmicBackground();
            
            // 帷幕
            const curtainW = W/2;
            ctx.fillStyle = COLORS.CURTAIN_RED;
            ctx.fillRect(leftCurtainX, 0, curtainW, H);
            
            // 简化帷幕纹理
            ctx.fillStyle = COLORS.CURTAIN_DARK;
            for (let i=0; i<curtainW; i+=40) {
                ctx.fillRect(leftCurtainX+i, 0, 8, H);
            }
            
            // 简化帷幕流苏
            ctx.strokeStyle = COLORS.GOLDEN;
            ctx.lineWidth = 2;
            for (let i=0; i<curtainW; i+=20) {
                ctx.beginPath();
                ctx.moveTo(leftCurtainX+i, H-8);
                ctx.lineTo(leftCurtainX+i+3, H-20);
                ctx.stroke();
            }
            
            // 帷幕顶部装饰
            ctx.fillStyle = COLORS.GOLDEN;
            ctx.fillRect(leftCurtainX, 0, curtainW, 6);
            
            // 右侧帷幕
            ctx.fillStyle = COLORS.CURTAIN_RED;
            ctx.fillRect(rightCurtainX, 0, curtainW, H);
            ctx.fillStyle = COLORS.CURTAIN_DARK;
            for (let i=0; i<curtainW; i+=40) {
                ctx.fillRect(rightCurtainX+i, 0, 8, H);
            }
            
            for (let i=0; i<curtainW; i+=20) {
                ctx.beginPath();
                ctx.moveTo(rightCurtainX+i, H-8);
                ctx.lineTo(rightCurtainX+i+3, H-20);
                ctx.stroke();
            }
            
            ctx.fillStyle = COLORS.GOLDEN;
            ctx.fillRect(rightCurtainX, 0, curtainW, 6);
        }

        // ---------- 宇宙背景 ----------
        function drawCosmicBackground() {
            // 深空渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(0.5, '#1a0a3a');
            gradient.addColorStop(1, '#0a1a3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            // 绘制星云
            nebulae.forEach(nebula => {
                nebula.update();
                nebula.draw(ctx);
            });
            
            // 绘制宇宙粒子
            cosmicParticles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
        }

        // ---------- 事件处理 ----------
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / (pixelRatio * rect.width);
            const scaleY = canvas.height / (pixelRatio * rect.height);
            
            let clientX, clientY;
            if (e.type.includes('touch')) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        // 触摸事件处理
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', handleTouchEnd);
        
        // 鼠标事件处理（兼容性）
        canvas.addEventListener('mousedown', handleMouseDown);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mouseup', handleMouseUp);
        
        function handleTouchStart(e) {
            e.preventDefault();
            isTouching = true;
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            
            if (state === STATE_TEXT) {
                buttons.forEach(b => {
                    if (b.handleClick(touchX, touchY)) {
                        showHeartFeedback = true;
                        heartTimer = 20;
                        heartPos = { x: b.rect.x + b.rect.w/2, y: b.rect.y + b.rect.h/2 };
                        showGift = true;
                        giftRevealed = true;
                    }
                });
            }
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            if (state === STATE_TEXT) buttons.forEach(b => b.handleMove(touchX, touchY));
        }
        
        function handleTouchEnd(e) {
            e.preventDefault();
            isTouching = false;
        }
        
        function handleMouseDown(e) {
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            
            if (state === STATE_TEXT) {
                buttons.forEach(b => {
                    if (b.handleClick(touchX, touchY)) {
                        showHeartFeedback = true;
                        heartTimer = 20;
                        heartPos = { x: b.rect.x + b.rect.w/2, y: b.rect.y + b.rect.h/2 };
                        showGift = true;
                        giftRevealed = true;
                    }
                });
            }
        }
        
        function handleMouseMove(e) {
            const pos = getTouchPos(e);
            touchX = pos.x;
            touchY = pos.y;
            if (state === STATE_TEXT) buttons.forEach(b => b.handleMove(touchX, touchY));
        }
        
        function handleMouseUp(e) {
            // 不需要特殊处理
        }

        // ---------- 动画循环 ----------
        function updateAndDraw() {
            // 更新浮动效果
            heartbeat++;
            roseFloatOffset = Math.sin(heartbeat * 0.015) * 5; // 减慢浮动速度
            ringFloatOffset = Math.sin(heartbeat * 0.015 + Math.PI * 0.5) * 5;
            
            if (state === STATE_CURTAIN) {
                drawCurtains();
                if (!curtainOpen) {
                    leftCurtainX -= curtainSpeed;
                    rightCurtainX += curtainSpeed;
                    if (leftCurtainX <= -W/2) {
                        curtainOpen = true;
                        state = STATE_FIREWORKS;
                        stateStartTime = performance.now();
                    }
                }
            } else if (state === STATE_FIREWORKS) {
                // 宇宙背景
                drawCosmicBackground();
                
                // 烟花
                fireworkTimer++;
                if (fireworkTimer >= FIREWORK_INTERVAL && fireworks.length < MAX_FIREWORKS) {
                    fireworks.push(new GlitterFirework());
                    fireworkTimer = 0;
                }
                fireworks = fireworks.filter(fw => fw.update());
                fireworks.forEach(fw => fw.draw(ctx));
                
                // 6秒后切换到文字状态（手机端缩短时间）
                if (performance.now() - stateStartTime > 6000) {
                    state = STATE_TEXT;
                    fireworks = [];
                }
            } else if (state === STATE_TEXT) {
                // 绘制宇宙背景
                drawCosmicBackground();
                
                // 文字动画
                if (!giftRevealed) {
                    if (textAlpha < 1.0) textAlpha = Math.min(1.0, textAlpha + 0.01);
                    else {
                        floatOffset = Math.sin(heartbeat * 0.01) * 3; // 减小浮动幅度
                        textScale = 1.0 + 0.01 * Math.sin(heartbeat * 0.015); // 减小缩放幅度
                    }
                }
                
                // 主文字 - 简化的金色文字，无发光效果
                const mainFontSize = Math.max(40, Math.min(70, W/8));
                drawSimpleText(ctx, 'I LOVE YOU', W/2, H * 0.15 + floatOffset, mainFontSize, 
                    {r:255,g:215,b:0}, textAlpha, textScale);
                
                // 中央展示区：戒指和玫瑰
                if (showGift) {
                    if (giftAlpha < 1.0) giftAlpha = Math.min(1.0, giftAlpha + 0.015);
                    
                    // 绘制中央展示区背景光环
                    const centerX = W/2;
                    const centerY = H/2;
                    
                    // 简化光环效果
                    const haloGradient = ctx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, Math.min(120, W/3)
                    );
                    haloGradient.addColorStop(0, 'rgba(255, 20, 147, 0.08)');
                    haloGradient.addColorStop(0.7, 'rgba(255, 105, 180, 0.03)');
                    haloGradient.addColorStop(1, 'rgba(255, 182, 193, 0)');
                    
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, Math.min(120, W/3), 0, Math.PI * 2);
                    ctx.fillStyle = haloGradient;
                    ctx.fill();
                    
                    // 左侧：简化玫瑰
                    const roseX = centerX - W * 0.2;
                    const roseY = centerY + roseFloatOffset;
                    drawSimpleRose(ctx, roseX, roseY, 0.8, giftAlpha);
                    
                    // 右侧：简化戒指
                    const ringX = centerX + W * 0.2;
                    const ringY = centerY + ringFloatOffset;
                    drawSimpleRing(ctx, ringX, ringY, 0.8, giftAlpha);
                    
                    // 简化连接线
                    ctx.beginPath();
                    ctx.moveTo(roseX + 20, roseY);
                    ctx.lineTo(ringX - 20, ringY);
                    ctx.strokeStyle = `rgba(255, 215, 0, ${giftAlpha * 0.3})`;
                    ctx.lineWidth = 1;
                    ctx.setLineDash([3, 3]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 永恒誓言文字 - 手机端减小字体
                    if (giftAlpha > 0.7) {
                        ctx.font = `italic ${Math.max(18, Math.min(24, W/20))}px Georgia, serif`;
                        ctx.fillStyle = `rgba(255, 255, 255, ${giftAlpha})`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('Eternal Love', centerX, centerY + H * 0.2);
                    }
                }
                
                // 按钮与爱心反馈
                if (!giftRevealed) {
                    buttons.forEach(b => { b.update(); b.draw(ctx); });
                    
                    if (showHeartFeedback) {
                        ctx.font = `${Math.max(40, Math.min(60, W/8))}px Georgia, serif`;
                        ctx.fillStyle = '#FF6464';
                        ctx.textAlign = 'center';
                        ctx.fillText('❤️', heartPos.x, heartPos.y - 30);
                        heartTimer--;
                        if (heartTimer <= 0) showHeartFeedback = false;
                    }
                }
                
                // 减少随机星光效果频率
                if (Math.random() < 0.08) {
                    for (let i=0; i<2; i++) {
                        const x = Math.random() * W;
                        const y = Math.random() * H;
                        const size = 0.5 + Math.random() * 1.5;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, 2*Math.PI);
                        ctx.fillStyle = `rgba(255, 240, 200, ${0.2+Math.random()*0.3})`;
                        ctx.fill();
                    }
                }
            }
            
            requestAnimationFrame(updateAndDraw);
        }

        // ---------- 初始化 ----------
        function init() {
            initParticles();
            initButtons();
            stateStartTime = performance.now();
            requestAnimationFrame(updateAndDraw);
        }

        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
