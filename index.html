<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Romantic Universe · Eternal Love ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a0a2a 50%, #0a1a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', 'Palatino', serif;
            overflow: hidden;
            color: #fff;
        }
        .canvas-wrapper {
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 
                        0 0 0 2px rgba(255, 215, 0, 0.3) inset,
                        0 0 40px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            display: inline-block;
            position: relative;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        canvas {
            display: block;
            width: 900px;
            height: 650px;
            cursor: pointer;
        }
        .instructions {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            z-index: 10;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="canvas-wrapper">
    <canvas id="romanticCanvas" width="900" height="650"></canvas>
    <div class="instructions">点击"Yes"按钮接收永恒之爱</div>
</div>
<script>
    (function(){
        "use strict";

        const canvas = document.getElementById('romanticCanvas');
        const ctx = canvas.getContext('2d');
        const W = 900, H = 650;

        // ---------- 全局参数 ----------
        const STATE_CURTAIN = 0;
        const STATE_FIREWORKS = 1;
        const STATE_TEXT = 2;
        let state = STATE_CURTAIN;

        // 帷幕
        let leftCurtainX = 0;
        let rightCurtainX = W / 2;
        const curtainSpeed = 5;
        let curtainOpen = false;

        // 烟花计时
        let fireworkTimer = 0;
        const FIREWORK_INTERVAL = 25;
        const MAX_FIREWORKS = 15;
        let fireworks = [];
        let stateStartTime = 0;

        // 宇宙粒子
        let cosmicParticles = [];
        const COSMIC_PARTICLES_COUNT = 300;
        let nebulae = [];
        const NEBULAE_COUNT = 3;

        // 文字动画
        let textAlpha = 0;
        let textScale = 1.0;
        let floatOffset = 0.0;
        let heartbeat = 0;

        // 按钮
        let buttons = [];
        let showHeartFeedback = false;
        let heartTimer = 0;
        let heartPos = { x: 0, y: 0 };

        // 礼物（戒指和玫瑰）
        let showGift = false;
        let giftAlpha = 0;
        let giftRevealed = false;
        let roseFloatOffset = 0;
        let ringFloatOffset = 0;

        // 鼠标位置
        let mouseX = 0, mouseY = 0;

        // ---------- 辅助函数：颜色 ----------
        const COLORS = {
            BLACK: '#000000',
            WHITE: '#FFFFFF',
            RED: '#DC143C',
            GOLD: '#FFD700',
            PINK: '#FF69B4',
            DARK_RED: '#8B0000',
            CURTAIN_RED: '#8C1414',
            CURTAIN_DARK: '#500000',
            GOLDEN: '#FFDF00',
            BLUE: '#1E90FF',
            PURPLE: '#BA55D3',
            ROSE: '#C81E32',
            LEAF: '#228B22',
            STARLIGHT: '#E6E6FA',
            NEBULA_PINK: '#FF1493',
            NEBULA_BLUE: '#4169E1',
            NEBULA_PURPLE: '#9370DB'
        };

        // ---------- 宇宙粒子系统 ----------
        class CosmicParticle {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 0.5 + Math.random() * 2.5;
                this.speed = 0.1 + Math.random() * 0.5;
                this.brightness = 50 + Math.floor(Math.random() * 206);
                this.twinkleSpeed = 0.01 + Math.random() * 0.03;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.type = Math.random() > 0.9 ? 'sparkle' : 'star';
                this.color = this.getColor();
            }
            
            getColor() {
                const colors = [
                    {r: 255, g: 255, b: 255},
                    {r: 255, g: 250, b: 205},
                    {r: 230, g: 230, b: 250},
                    {r: 176, g: 224, b: 230},
                    {r: 255, g: 228, b: 225}
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.brightness = 80 + Math.sin(this.twinklePhase) * 100;
                this.brightness = Math.max(30, Math.min(255, this.brightness));
                
                // 缓慢移动
                this.x += Math.sin(this.twinklePhase * 0.5) * 0.1;
                this.y += Math.cos(this.twinklePhase * 0.3) * 0.1;
                
                // 边界检查
                if (this.x < 0) this.x = W;
                if (this.x > W) this.x = 0;
                if (this.y < 0) this.y = H;
                if (this.y > H) this.y = 0;
            }
            
            draw(ctx) {
                const alpha = this.brightness / 255;
                
                if (this.type === 'sparkle') {
                    // 闪烁的星星
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                    
                    // 星光效果
                    ctx.beginPath();
                    ctx.moveTo(this.x - this.size * 3, this.y);
                    ctx.lineTo(this.x + this.size * 3, this.y);
                    ctx.moveTo(this.x, this.y - this.size * 3);
                    ctx.lineTo(this.x, this.y + this.size * 3);
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.5})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                } else {
                    // 普通星星
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                }
            }
        }

        // ---------- 星云 ----------
        class Nebula {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.size = 100 + Math.random() * 200;
                this.color = this.getColor();
                this.density = 0.3 + Math.random() * 0.4;
                this.pulseSpeed = 0.002 + Math.random() * 0.003;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            
            getColor() {
                const colors = [
                    {r: 255, g: 20, b: 147, a: 0.03},  // 深粉色
                    {r: 65, g: 105, b: 225, a: 0.04},   // 皇家蓝
                    {r: 147, g: 112, b: 219, a: 0.035}, // 中紫色
                    {r: 72, g: 61, b: 139, a: 0.04},    // 暗蓝紫色
                    {r: 123, g: 104, b: 238, a: 0.03}   // 中石板蓝
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.pulsePhase += this.pulseSpeed;
            }
            
            draw(ctx) {
                const pulse = 0.8 + Math.sin(this.pulsePhase) * 0.2;
                const currentSize = this.size * pulse;
                
                // 创建径向渐变
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentSize
                );
                
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a})`);
                gradient.addColorStop(0.7, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.color.a * 0.5})`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // ---------- 烟花粒子系统 ----------
        class SparkleParticle {
            constructor(x, y, color, vx, vy, lifetime, gravity = 0.08, size = 3, trail = false) {
                this.x = x; this.y = y;
                this.color = color;
                this.vx = vx; this.vy = vy;
                this.lifetime = lifetime;
                this.maxLifetime = lifetime;
                this.age = 0;
                this.gravity = gravity;
                this.size = size;
                this.trail = trail;
                this.prevPositions = [];
            }
            update() {
                if (this.trail && this.age % 2 === 0) {
                    this.prevPositions.push({ x: this.x, y: this.y });
                    if (this.prevPositions.length > 8) this.prevPositions.shift();
                }
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.age++;
                return this.age < this.lifetime;
            }
            draw(ctx) {
                const alpha = Math.max(0, 255 - Math.floor(255 * this.age / this.lifetime));
                const currentSize = Math.max(1, Math.floor(this.size * (1 - this.age / this.lifetime) + 2));
                
                if (this.trail && this.prevPositions.length > 1) {
                    for (let i = 0; i < this.prevPositions.length; i++) {
                        const pos = this.prevPositions[i];
                        const trailAlpha = Math.floor(alpha * (i / this.prevPositions.length) * 0.6);
                        const trailSize = Math.max(1, Math.floor(currentSize * (i / this.prevPositions.length)));
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, trailSize, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${trailAlpha / 255})`;
                        ctx.fill();
                    }
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha / 3 / 255})`;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha / 255})`;
                ctx.fill();
            }
        }

        class GlitterFirework {
            constructor() {
                this.x = 150 + Math.random() * (W - 300);
                this.y = 100 + Math.random() * (H - 300);
                this.particles = [];
                this.secondaryParticles = [];
                this.exploded = false;
                this.secondaryExploded = false;
                this.rocketY = H;
                this.rocketSpeed = 9 + Math.floor(Math.random() * 7);
                this.rocketX = this.x;
                this.rocketTrail = [];
                
                const palettes = [
                    [{ r: 220, g: 20, b: 60 }, { r: 255, g: 215, b: 0 }, { r: 255, g: 105, b: 180 }],
                    [{ r: 30, g: 144, b: 255 }, { r: 0, g: 255, b: 255 }, { r: 186, g: 85, b: 211 }],
                    [{ r: 255, g: 223, b: 0 }, { r: 255, g: 140, b: 0 }, { r: 220, g: 20, b: 60 }],
                    [{ r: 255, g: 20, b: 147 }, { r: 255, g: 105, b: 180 }, { r: 255, g: 182, b: 193 }]
                ];
                this.colorPalette = palettes[Math.floor(Math.random() * palettes.length)];
                this.explosionType = ['sphere', 'ring', 'heart'][Math.floor(Math.random() * 3)];
            }
            update() {
                if (!this.exploded) {
                    this.rocketTrail.push({ x: this.rocketX, y: this.rocketY });
                    if (this.rocketTrail.length > 12) this.rocketTrail.shift();
                    this.rocketY -= this.rocketSpeed;
                    if (this.rocketY <= this.y) {
                        this.exploded = true;
                        this.explode();
                    }
                    return true;
                } else {
                    this.particles = this.particles.filter(p => p.update());
                    if (this.secondaryExploded) {
                        this.secondaryParticles = this.secondaryParticles.filter(p => p.update());
                    } else if (this.particles.length < 50 && !this.secondaryExploded) {
                        this.secondaryExplode();
                    }
                    return this.particles.length > 0 || this.secondaryParticles.length > 0;
                }
            }
            explode() {
                const num = 80 + Math.floor(Math.random() * 41);
                for (let i = 0; i < num; i++) {
                    let angle, speed;
                    if (this.explosionType === 'sphere') {
                        angle = Math.random() * 2 * Math.PI;
                        speed = 3 + Math.random() * 4;
                    } else if (this.explosionType === 'ring') {
                        angle = Math.random() * 2 * Math.PI;
                        speed = 5 + Math.random() * 3;
                        angle += (Math.random() - 0.5) * 0.4;
                    } else {
                        const t = Math.random() * 2 * Math.PI;
                        const x = 16 * Math.pow(Math.sin(t), 3);
                        const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                        angle = Math.atan2(y, x);
                        speed = 4 + Math.random() * 4;
                    }
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const lifetime = 60 + Math.floor(Math.random() * 61);
                    const color = this.colorPalette[Math.floor(Math.random() * this.colorPalette.length)];
                    const size = 3 + Math.floor(Math.random() * 3);
                    this.particles.push(new SparkleParticle(this.x, this.y, color, vx, vy, lifetime, 0.06, size, true));
                }
            }
            secondaryExplode() {
                this.secondaryExploded = true;
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 3;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const lifetime = 40 + Math.floor(Math.random() * 41);
                    const color = { r: 255, g: 223, b: 0 };
                    this.secondaryParticles.push(new SparkleParticle(this.x, this.y, color, vx, vy, lifetime, 0.05, 2, false));
                }
            }
            draw(ctx) {
                if (!this.exploded) {
                    for (let i = 0; i < this.rocketTrail.length; i++) {
                        const pos = this.rocketTrail[i];
                        const alpha = Math.floor(200 * (i / this.rocketTrail.length));
                        const size = Math.floor(4 * (i / this.rocketTrail.length)) + 1;
                        ctx.beginPath();
                        ctx.arc(pos.x, pos.y, size, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 200, 100, ${alpha/255})`;
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(this.rocketX, this.rocketY, 5, 0, Math.PI*2);
                    ctx.fillStyle = '#FFF';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.rocketX, this.rocketY, 3, 0, Math.PI*2);
                    ctx.fillStyle = '#FFDF00';
                    ctx.fill();
                } else {
                    this.particles.forEach(p => p.draw(ctx));
                    this.secondaryParticles.forEach(p => p.draw(ctx));
                }
            }
        }

        // ---------- 初始化宇宙粒子 ----------
        for (let i = 0; i < COSMIC_PARTICLES_COUNT; i++) {
            cosmicParticles.push(new CosmicParticle());
        }
        
        for (let i = 0; i < NEBULAE_COUNT; i++) {
            nebulae.push(new Nebula());
        }

        // ---------- 按钮类 ----------
        class CanvasButton {
            constructor(x, y, w, h, text, normalColor, hoverColor, clickColor) {
                this.rect = { x, y, w, h };
                this.text = text;
                this.normal = normalColor;
                this.hover = hoverColor;
                this.click = clickColor;
                this.current = normalColor;
                this.clicked = false;
                this.clickTimer = 0;
                this.glow = 0;
                this.glowDirection = 1;
            }
            checkHover(mx, my) {
                return mx >= this.rect.x && mx <= this.rect.x + this.rect.w && my >= this.rect.y && my <= this.rect.y + this.rect.h;
            }
            handleMove(mx, my) {
                if (giftRevealed) return;
                this.current = this.checkHover(mx, my) ? this.hover : this.normal;
            }
            handleClick(mx, my) {
                if (giftRevealed) return false;
                if (this.checkHover(mx, my)) {
                    this.clicked = true;
                    this.clickTimer = 10;
                    this.current = this.click;
                    return true;
                }
                return false;
            }
            update() {
                if (this.clicked) {
                    this.clickTimer--;
                    if (this.clickTimer <= 0) {
                        this.clicked = false;
                        this.current = this.normal;
                    }
                }
                
                // 按钮发光效果
                if (!giftRevealed) {
                    this.glow += 0.05 * this.glowDirection;
                    if (this.glow > 1) {
                        this.glow = 1;
                        this.glowDirection = -1;
                    } else if (this.glow < 0.3) {
                        this.glow = 0.3;
                        this.glowDirection = 1;
                    }
                }
            }
            draw(ctx) {
                if (giftRevealed) return;
                
                // 按钮背景
                ctx.fillStyle = this.current;
                ctx.shadowColor = '#FFD700';
                ctx.shadowBlur = 8 + this.glow * 8;
                ctx.beginPath();
                ctx.roundRect(this.rect.x, this.rect.y, this.rect.w, this.rect.h, 15);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 按钮边框
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 按钮文字
                ctx.font = 'bold 48px Georgia, "Times New Roman", serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowColor = '#500000';
                ctx.shadowBlur = 4;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.rect.x + this.rect.w/2 + 2, this.rect.y + this.rect.h/2 + 2);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#FFFFFF';
                ctx.fillText(this.text, this.rect.x + this.rect.w/2, this.rect.y + this.rect.h/2);
            }
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // 按钮配置 - 位置上移，两个按钮都显示"Yes"
        const btnW = 180, btnH = 70, spacing = 50;
        const startX = (W - (btnW*2 + spacing)) / 2;
        const btnY = H - 200; // 上移按钮位置
        const btn1 = new CanvasButton(startX, btnY, btnW, btnH, 'Yes', '#C85064', '#E68C96', '#A03246');
        const btn2 = new CanvasButton(startX + btnW + spacing, btnY, btnW, btnH, 'Yes', '#C85064', '#E68C96', '#A03246');
        buttons = [btn1, btn2];

        // ---------- 文字绘制 ----------
        function drawGlowText(ctx, text, x, y, fontSize, mainColor, glowColor, alpha = 1.0, scale = 1.0, offsetY = 0) {
            if (giftRevealed) return;
            ctx.save();
            ctx.translate(x, y + offsetY);
            ctx.scale(scale, scale);
            ctx.font = `bold ${fontSize}px Georgia, "Times New Roman", serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 多层发光效果
            for (let i = 8; i > 0; i--) {
                const a = Math.floor(80 * (1 - i/8) * alpha);
                ctx.fillStyle = `rgba(${glowColor.r}, ${glowColor.g}, ${glowColor.b}, ${a/255})`;
                for (let dx = -i; dx <= i; dx+=i*2) {
                    for (let dy = -i; dy <= i; dy+=i*2) {
                        ctx.fillText(text, dx, dy);
                    }
                }
            }
            
            // 主文字
            ctx.fillStyle = `rgba(${mainColor.r}, ${mainColor.g}, ${mainColor.b}, ${alpha})`;
            ctx.fillText(text, 0, 0);
            ctx.restore();
        }

        // ---------- 写实玫瑰 ----------
        function drawRealisticRose(ctx, x, y, size = 1.0, alpha = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            
            // 花茎
            ctx.beginPath();
            ctx.moveTo(0, 40 * size);
            ctx.lineTo(0, 120 * size);
            ctx.lineWidth = 8 * size;
            ctx.strokeStyle = `rgba(34, 139, 34, ${alpha})`;
            ctx.stroke();
            
            // 叶子
            ctx.beginPath();
            ctx.moveTo(0, 80 * size);
            ctx.quadraticCurveTo(-25 * size, 70 * size, -35 * size, 90 * size);
            ctx.quadraticCurveTo(-20 * size, 95 * size, 0, 85 * size);
            ctx.closePath();
            ctx.fillStyle = `rgba(50, 205, 50, ${alpha})`;
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(0, 90 * size);
            ctx.quadraticCurveTo(25 * size, 80 * size, 35 * size, 100 * size);
            ctx.quadraticCurveTo(20 * size, 105 * size, 0, 95 * size);
            ctx.closePath();
            ctx.fillStyle = `rgba(60, 179, 113, ${alpha})`;
            ctx.fill();
            
            // 花蕾外层花瓣
            const petals = 8;
            for (let i = 0; i < petals; i++) {
                const angle = (i / petals) * Math.PI * 2;
                const petalSize = 20 * size;
                
                ctx.save();
                ctx.rotate(angle);
                
                // 花瓣渐变
                const gradient = ctx.createRadialGradient(
                    0, -15 * size, 0,
                    0, -15 * size, petalSize
                );
                gradient.addColorStop(0, `rgba(220, 20, 60, ${alpha})`);
                gradient.addColorStop(0.7, `rgba(255, 105, 180, ${alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(255, 182, 193, 0)`);
                
                ctx.beginPath();
                ctx.ellipse(0, -15 * size, petalSize, petalSize * 0.7, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
            
            // 花蕾内层花瓣
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const petalSize = 12 * size;
                
                ctx.save();
                ctx.rotate(angle + 0.2);
                
                const gradient = ctx.createRadialGradient(
                    0, -10 * size, 0,
                    0, -10 * size, petalSize
                );
                gradient.addColorStop(0, `rgba(255, 20, 147, ${alpha})`);
                gradient.addColorStop(0.8, `rgba(255, 182, 193, ${alpha * 0.7})`);
                gradient.addColorStop(1, `rgba(255, 240, 245, 0)`);
                
                ctx.beginPath();
                ctx.ellipse(0, -10 * size, petalSize, petalSize * 0.8, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
            
            // 花蕊
            ctx.beginPath();
            ctx.arc(0, 0, 5 * size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 215, 0, ${alpha})`;
            ctx.fill();
            
            // 花蕊细节
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const length = 8 * size;
                
                ctx.beginPath();
                ctx.moveTo(
                    Math.cos(angle) * 5 * size,
                    Math.sin(angle) * 5 * size
                );
                ctx.lineTo(
                    Math.cos(angle) * (5 + length) * size,
                    Math.sin(angle) * (5 + length) * size
                );
                ctx.strokeStyle = `rgba(255, 140, 0, ${alpha})`;
                ctx.lineWidth = 2 * size;
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // ---------- 写实戒指 ----------
        function drawRealisticRing(ctx, x, y, size = 1.0, alpha = 1.0) {
            ctx.save();
            ctx.translate(x, y);
            
            // 戒指环
            const ringGradient = ctx.createLinearGradient(-25 * size, 0, 25 * size, 0);
            ringGradient.addColorStop(0, `rgba(218, 165, 32, ${alpha})`);
            ringGradient.addColorStop(0.5, `rgba(255, 215, 0, ${alpha})`);
            ringGradient.addColorStop(1, `rgba(218, 165, 32, ${alpha})`);
            
            ctx.beginPath();
            ctx.ellipse(0, 0, 25 * size, 12 * size, 0, 0, Math.PI * 2);
            ctx.fillStyle = ringGradient;
            ctx.fill();
            
            // 戒指内圈阴影
            ctx.beginPath();
            ctx.ellipse(0, 0, 23 * size, 10 * size, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(139, 69, 19, ${alpha * 0.3})`;
            ctx.fill();
            
            // 钻石底座
            ctx.beginPath();
            ctx.moveTo(-10 * size, -25 * size);
            ctx.lineTo(10 * size, -25 * size);
            ctx.lineTo(8 * size, -15 * size);
            ctx.lineTo(-8 * size, -15 * size);
            ctx.closePath();
            
            const baseGradient = ctx.createLinearGradient(0, -25 * size, 0, -15 * size);
            baseGradient.addColorStop(0, `rgba(192, 192, 192, ${alpha})`);
            baseGradient.addColorStop(1, `rgba(105, 105, 105, ${alpha})`);
            ctx.fillStyle = baseGradient;
            ctx.fill();
            
            // 钻石
            ctx.beginPath();
            ctx.moveTo(0, -40 * size);
            ctx.lineTo(8 * size, -25 * size);
            ctx.lineTo(0, -20 * size);
            ctx.lineTo(-8 * size, -25 * size);
            ctx.closePath();
            
            const diamondGradient = ctx.createLinearGradient(-8 * size, -25 * size, 8 * size, -25 * size);
            diamondGradient.addColorStop(0, `rgba(230, 230, 250, ${alpha})`);
            diamondGradient.addColorStop(0.5, `rgba(255, 255, 255, ${alpha})`);
            diamondGradient.addColorStop(1, `rgba(230, 230, 250, ${alpha})`);
            
            ctx.fillStyle = diamondGradient;
            ctx.fill();
            
            // 钻石切面
            ctx.beginPath();
            ctx.moveTo(0, -40 * size);
            ctx.lineTo(4 * size, -30 * size);
            ctx.lineTo(0, -20 * size);
            ctx.lineTo(-4 * size, -30 * size);
            ctx.closePath();
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.8})`;
            ctx.fill();
            
            // 钻石反光
            ctx.beginPath();
            ctx.arc(-3 * size, -32 * size, 2 * size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
            ctx.fill();
            
            // 戒指光泽
            ctx.beginPath();
            ctx.ellipse(-15 * size, -2 * size, 5 * size, 2 * size, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
            ctx.fill();
            
            ctx.restore();
        }

        // ---------- 帷幕 ----------
        function drawCurtains() {
            // 星空背景
            drawCosmicBackground();
            
            // 帷幕
            const curtainW = W/2;
            ctx.fillStyle = COLORS.CURTAIN_RED;
            ctx.fillRect(leftCurtainX, 0, curtainW, H);
            
            // 帷幕纹理
            ctx.fillStyle = COLORS.CURTAIN_DARK;
            for (let i=0; i<curtainW; i+=30) {
                ctx.fillRect(leftCurtainX+i, 0, 10, H);
            }
            
            // 帷幕流苏
            ctx.strokeStyle = COLORS.GOLDEN;
            ctx.lineWidth = 3;
            for (let i=0; i<curtainW; i+=15) {
                ctx.beginPath();
                ctx.moveTo(leftCurtainX+i, H-10);
                ctx.lineTo(leftCurtainX+i+5, H-25);
                ctx.stroke();
            }
            
            // 帷幕顶部装饰
            ctx.fillStyle = COLORS.GOLDEN;
            ctx.fillRect(leftCurtainX, 0, curtainW, 8);
            
            // 右侧帷幕
            ctx.fillStyle = COLORS.CURTAIN_RED;
            ctx.fillRect(rightCurtainX, 0, curtainW, H);
            ctx.fillStyle = COLORS.CURTAIN_DARK;
            for (let i=0; i<curtainW; i+=30) {
                ctx.fillRect(rightCurtainX+i, 0, 10, H);
            }
            
            for (let i=0; i<curtainW; i+=15) {
                ctx.beginPath();
                ctx.moveTo(rightCurtainX+i, H-10);
                ctx.lineTo(rightCurtainX+i+5, H-25);
                ctx.stroke();
            }
            
            ctx.fillStyle = COLORS.GOLDEN;
            ctx.fillRect(rightCurtainX, 0, curtainW, 8);
        }

        // ---------- 宇宙背景 ----------
        function drawCosmicBackground() {
            // 深空渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(0.5, '#1a0a3a');
            gradient.addColorStop(1, '#0a1a3a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);
            
            // 绘制星云
            nebulae.forEach(nebula => {
                nebula.update();
                nebula.draw(ctx);
            });
            
            // 绘制宇宙粒子
            cosmicParticles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
        }

        // ---------- 事件处理 ----------
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            if (state === STATE_TEXT) buttons.forEach(b => b.handleMove(mouseX, mouseY));
        });
        
        canvas.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            if (state === STATE_TEXT) {
                buttons.forEach(b => {
                    if (b.handleClick(mx, my)) {
                        showHeartFeedback = true;
                        heartTimer = 30;
                        heartPos = { x: b.rect.x + b.rect.w/2, y: b.rect.y + b.rect.h/2 };
                        showGift = true;
                        giftRevealed = true;
                    }
                });
            }
        });

        // ---------- 动画循环 ----------
        function updateAndDraw() {
            // 更新浮动效果
            heartbeat++;
            roseFloatOffset = Math.sin(heartbeat * 0.02) * 8;
            ringFloatOffset = Math.sin(heartbeat * 0.02 + Math.PI * 0.5) * 8;
            
            if (state === STATE_CURTAIN) {
                drawCurtains();
                if (!curtainOpen) {
                    leftCurtainX -= curtainSpeed;
                    rightCurtainX += curtainSpeed;
                    if (leftCurtainX <= -W/2) {
                        curtainOpen = true;
                        state = STATE_FIREWORKS;
                        stateStartTime = performance.now();
                    }
                }
            } else if (state === STATE_FIREWORKS) {
                // 宇宙背景
                drawCosmicBackground();
                
                // 烟花
                fireworkTimer++;
                if (fireworkTimer >= FIREWORK_INTERVAL && fireworks.length < MAX_FIREWORKS) {
                    fireworks.push(new GlitterFirework());
                    fireworkTimer = 0;
                }
                fireworks = fireworks.filter(fw => fw.update());
                fireworks.forEach(fw => fw.draw(ctx));
                
                // 8秒后切换到文字状态
                if (performance.now() - stateStartTime > 8000) {
                    state = STATE_TEXT;
                    fireworks = [];
                }
            } else if (state === STATE_TEXT) {
                // 绘制宇宙背景
                drawCosmicBackground();
                
                // 文字动画
                if (!giftRevealed) {
                    if (textAlpha < 1.0) textAlpha = Math.min(1.0, textAlpha + 0.012);
                    else {
                        floatOffset = Math.sin(heartbeat * 0.015) * 5;
                        textScale = 1.0 + 0.02 * Math.sin(heartbeat * 0.02);
                    }
                }
                
                // 主文字
                drawGlowText(ctx, 'I LOVE YOU', W/2, 100 + floatOffset, 110, 
                    {r:255,g:182,b:193}, {r:255,g:240,b:245}, textAlpha, textScale);
                
                // 副标题
                if (!giftRevealed && textAlpha > 0.3) {
                    const subAlpha = Math.min(1.0, (textAlpha - 0.3) * 2.5);
                    drawGlowText(ctx, 'Will you be mine forever?', W/2, 180, 40, 
                        {r:255,g:200,b:200}, {r:255,g:240,b:245}, subAlpha, 1.0);
                }
                
                // 中央展示区：戒指和玫瑰
                if (showGift) {
                    if (giftAlpha < 1.0) giftAlpha = Math.min(1.0, giftAlpha + 0.02);
                    
                    // 绘制中央展示区背景光环
                    const centerX = W/2;
                    const centerY = H/2 + 30;
                    
                    // 光环效果
                    const haloGradient = ctx.createRadialGradient(
                        centerX, centerY, 0,
                        centerX, centerY, 200
                    );
                    haloGradient.addColorStop(0, 'rgba(255, 20, 147, 0.1)');
                    haloGradient.addColorStop(0.7, 'rgba(255, 105, 180, 0.05)');
                    haloGradient.addColorStop(1, 'rgba(255, 182, 193, 0)');
                    
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 200, 0, Math.PI * 2);
                    ctx.fillStyle = haloGradient;
                    ctx.fill();
                    
                    // 左侧：写实玫瑰
                    const roseX = centerX - 150;
                    const roseY = centerY + roseFloatOffset;
                    drawRealisticRose(ctx, roseX, roseY, 1.2, giftAlpha);
                    
                    // 右侧：写实戒指
                    const ringX = centerX + 150;
                    const ringY = centerY + ringFloatOffset;
                    drawRealisticRing(ctx, ringX, ringY, 1.2, giftAlpha);
                    
                    // 连接线
                    ctx.beginPath();
                    ctx.moveTo(roseX + 30, roseY);
                    ctx.bezierCurveTo(roseX + 70, roseY - 30, ringX - 70, ringY - 30, ringX - 30, ringY);
                    ctx.strokeStyle = `rgba(255, 215, 0, ${giftAlpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 永恒誓言文字
                    if (giftAlpha > 0.7) {
                        ctx.font = 'italic 32px Georgia, serif';
                        ctx.fillStyle = `rgba(255, 255, 255, ${giftAlpha})`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('Eternal Love & Commitment', centerX, centerY + 130);
                    }
                }
                
                // 按钮与爱心反馈
                if (!giftRevealed) {
                    buttons.forEach(b => { b.update(); b.draw(ctx); });
                    
                    if (showHeartFeedback) {
                        ctx.font = '80px Georgia, serif';
                        ctx.fillStyle = '#FF6464';
                        ctx.textAlign = 'center';
                        ctx.fillText('❤️', heartPos.x, heartPos.y - 50);
                        heartTimer--;
                        if (heartTimer <= 0) showHeartFeedback = false;
                    }
                }
                
                // 随机星光效果
                if (Math.random() < 0.15) {
                    for (let i=0; i<3; i++) {
                        const x = Math.random() * W;
                        const y = Math.random() * H;
                        const size = 1 + Math.random() * 3;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, 2*Math.PI);
                        ctx.fillStyle = `rgba(255, 240, 200, ${0.3+Math.random()*0.4})`;
                        ctx.fill();
                    }
                }
            }
            
            requestAnimationFrame(updateAndDraw);
        }

        stateStartTime = performance.now();
        requestAnimationFrame(updateAndDraw);
    })();
</script>
</body>
</html>
